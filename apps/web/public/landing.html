<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KARNA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; font-family: 'Cinzel', serif; }
  canvas { display: block; position: absolute; top: 0; left: 0; }

  /* ===== CINEMATIC OVERLAY ===== */
  #cinematic-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; z-index: 200;
    display: flex; justify-content: center; align-items: center;
    opacity: 1; transition: opacity 1.5s ease;
    pointer-events: none;
  }
  #cinematic-overlay.fade-out { opacity: 0; }

  /* ===== SANSKRIT VERSE (cinematic intro) ===== */
  #sanskrit-verse {
    position: fixed; top: 38%; left: 50%; transform: translate(-50%, -50%);
    z-index: 201; text-align: center; opacity: 0;
    font-family: 'Cinzel', serif; pointer-events: none;
  }
  #sanskrit-verse .shloka {
    font-size: 18px; color: rgba(255, 180, 60, 0.9);
    letter-spacing: 3px; line-height: 2;
    text-shadow: 0 0 30px rgba(255, 140, 0, 0.3);
  }
  #sanskrit-verse .meaning {
    font-size: 11px; color: rgba(200, 160, 100, 0.5);
    letter-spacing: 5px; margin-top: 20px; text-transform: uppercase;
  }

  /* ===== TITLE ===== */
  #title-container {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 150; text-align: center; opacity: 0;
    pointer-events: none;
  }
  #title-text {
    font-family: 'Cinzel Decorative', 'Cinzel', serif;
    font-size: clamp(60px, 12vw, 160px);
    font-weight: 900;
    letter-spacing: clamp(15px, 4vw, 50px);
    color: transparent;
    background: linear-gradient(180deg,
      #ffd700 0%, #ffb347 15%, #ff8c00 30%,
      #daa520 50%,
      #ff6b00 70%, #ff4500 85%, #8b0000 100%);
    -webkit-background-clip: text;
    background-clip: text;
    filter: drop-shadow(0 0 40px rgba(255, 140, 0, 0.4)) drop-shadow(0 0 80px rgba(255, 80, 0, 0.2));
    text-shadow: none;
    position: relative;
  }
  #subtitle {
    font-family: 'Cinzel', serif;
    font-size: clamp(10px, 1.5vw, 16px);
    letter-spacing: clamp(8px, 2vw, 20px);
    color: rgba(200, 150, 80, 0.6);
    margin-top: 15px;
    text-transform: uppercase;
  }

  /* ===== ENTER BUTTON ===== */
  #enter-btn {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, 0);
    z-index: 160; cursor: pointer; text-decoration: none;
    font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600;
    letter-spacing: 8px; text-transform: uppercase;
    color: rgba(255, 180, 80, 0.7);
    padding: 14px 45px;
    border: 1px solid rgba(255, 140, 0, 0.25);
    background: transparent;
    transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    opacity: 0;
  }
  #enter-btn:hover {
    color: rgba(255, 220, 150, 0.95);
    border-color: rgba(255, 160, 40, 0.5);
    letter-spacing: 12px; padding: 14px 55px;
    box-shadow: 0 0 30px rgba(255, 140, 0, 0.1), 0 0 60px rgba(255, 100, 0, 0.05),
      inset 0 0 20px rgba(255, 140, 0, 0.04);
  }
  #enter-btn::before, #enter-btn::after {
    content: ''; position: absolute;
    transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  #enter-btn::before {
    top: -1px; left: -1px; width: 14px; height: 14px;
    border-top: 1px solid rgba(255, 140, 0, 0.4);
    border-left: 1px solid rgba(255, 140, 0, 0.4);
  }
  #enter-btn::after {
    bottom: -1px; right: -1px; width: 14px; height: 14px;
    border-bottom: 1px solid rgba(255, 140, 0, 0.4);
    border-right: 1px solid rgba(255, 140, 0, 0.4);
  }
  #enter-btn:hover::before, #enter-btn:hover::after {
    width: 20px; height: 20px; border-color: rgba(255, 160, 40, 0.6);
  }

  /* Decorative line */
  .enter-line {
    position: fixed; top: 50%; left: 50%;
    transform: translateX(-50%); width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,140,0,0.2), transparent);
    z-index: 160; opacity: 0;
  }

  /* ===== PREMIUM VIGNETTE OVERLAY ===== */
  #vignette {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 140; pointer-events: none;
    background: radial-gradient(ellipse 70% 60% at 50% 50%, transparent 40%, rgba(0,0,0,0.5) 80%, rgba(0,0,0,0.85) 100%);
  }

  /* ===== FILM GRAIN ===== */
  #grain {
    position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
    z-index: 145; pointer-events: none; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    animation: grain 0.5s steps(4) infinite;
  }
  @keyframes grain {
    0%, 100% { transform: translate(0, 0); }
    25% { transform: translate(-5%, -5%); }
    50% { transform: translate(5%, 3%); }
    75% { transform: translate(-3%, 5%); }
  }

  /* ===== ORNAMENTAL DIVIDER above subtitle ===== */
  .ornament {
    display: block; margin: 10px auto 5px; width: 120px; height: 14px;
    position: relative;
  }
  .ornament::before {
    content: ''; position: absolute; top: 50%; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,180,60,0.35), rgba(255,200,100,0.5), rgba(255,180,60,0.35), transparent);
  }
  .ornament::after {
    content: '◆'; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 6px; color: rgba(255, 200, 100, 0.5);
  }
</style>
</head>
<body>

<div id="cinematic-overlay"></div>
<div id="sanskrit-verse">
  <div class="shloka">दानवीर कर्ण</div>
  <div class="meaning">The Generous Warrior — Unwavering Loyalty</div>
</div>

<canvas id="bg"></canvas>
<canvas id="fg"></canvas>
<div id="vignette"></div>
<div id="grain"></div>

<div id="title-container">
  <div id="title-text"><span>K</span><span>A</span><span id="letter-r">R</span><span>N</span><span>A</span></div>
  <div class="ornament"></div>
  <div id="subtitle">Your Loyal AI Agent</div>
</div>

<div class="enter-line"></div>
<a id="enter-btn" href="/chat">Enter</a>

<script>
// ============================================================
// KARNA — CINEMATIC LANDING PAGE
// Ancient Hindu Mythology + AI Agent Theme
// ============================================================

const bgC = document.getElementById('bg');
const fgC = document.getElementById('fg');
const bgX = bgC.getContext('2d');
const fgX = fgC.getContext('2d');
let W, H, cx, cy;
let wheelCx, wheelCy; // Tracks exact center of letter R for wheel alignment

// ============================================================
// CINEMATIC TIMELINE
// ============================================================
let startTime = Date.now();
const PHASE = {
  DARKNESS: 0,       // 0-1s: Pure black
  VERSE_IN: 1000,    // 1-2.5s: Sanskrit verse fades in
  VERSE_HOLD: 2500,  // 2.5-4.5s: Hold verse
  VERSE_OUT: 4500,   // 4.5-5.5s: Verse fades out
  SUNBURST: 5500,    // 5.5-7s: Sun explosion from center
  TITLE_IN: 6500,    // 6.5-8s: Title reveals
  FULL_SCENE: 8000,  // 8s+: All effects running, enter button appears
};

function getPhaseAlpha(t, start, end) {
  if (t < start) return 0;
  if (t > end) return 1;
  return (t - start) / (end - start);
}

// ============================================================
// RESIZE
// ============================================================
var stars = [], nebulae = [];
function resize() {
  W = bgC.width = fgC.width = window.innerWidth;
  H = bgC.height = fgC.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  wheelCx = cx; wheelCy = cy; // default to center, updated per-frame from R
  initStars();
}
window.addEventListener('resize', resize);

// Update wheel center from the actual letter R position
function updateWheelCenter() {
  let rSpan = document.getElementById('letter-r');
  if (rSpan) {
    let rect = rSpan.getBoundingClientRect();
    wheelCx = rect.left + rect.width / 2;
    wheelCy = rect.top + rect.height / 2;
  }
}

// ============================================================
// STARS — warm-toned celestial field
// ============================================================
function initStars() {
  stars = [];
  for (let i = 0; i < 400; i++) {
    stars.push({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      bright: Math.random(),
      speed: Math.random() * 0.3 + 0.05,
      hue: Math.random() < 0.6 ? 30 + Math.random() * 20 : 200 + Math.random() * 40,
      twinkleSpeed: Math.random() * 0.02 + 0.005
    });
  }
}

function drawStars(t) {
  for (const s of stars) {
    s.bright += Math.sin(t * s.twinkleSpeed) * 0.01;
    let b = Math.max(0.1, Math.min(1, s.bright));
    bgX.beginPath();
    bgX.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    bgX.fillStyle = `hsla(${s.hue}, 80%, 85%, ${b * 0.8})`;
    bgX.fill();
    if (s.r > 1) {
      bgX.beginPath();
      bgX.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
      bgX.fillStyle = `hsla(${s.hue}, 60%, 70%, ${b * 0.08})`;
      bgX.fill();
    }
  }
}

// ============================================================
// DIVINE SUN — Surya (Karna's father)
// ============================================================
function drawSun(t, elapsed) { return; }

// ============================================================
// FIRE PARTICLES — divine flames
// ============================================================
let fireParticles = [];
function initFire() {
  for (let i = 0; i < 120; i++) {
    fireParticles.push(newFireParticle());
  }
}
function newFireParticle() {
  let angle = Math.random() * Math.PI * 2;
  let dist = Math.random() * W * 0.4 + 50;
  return {
    x: cx + Math.cos(angle) * dist * (0.5 + Math.random()),
    y: H + 20,
    vx: (Math.random() - 0.5) * 0.8,
    vy: -(Math.random() * 2 + 0.5),
    life: 1,
    decay: Math.random() * 0.008 + 0.003,
    r: Math.random() * 3 + 1,
    hue: Math.random() < 0.7 ? 20 + Math.random() * 25 : 0 + Math.random() * 15,
  };
}
function drawFire(t, elapsed) {
  if (elapsed < PHASE.SUNBURST) return;
  let fAlpha = Math.min(1, (elapsed - PHASE.SUNBURST) / 3000);
  for (let p of fireParticles) {
    p.x += p.vx + Math.sin(t * 0.002 + p.x * 0.01) * 0.3;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) { Object.assign(p, newFireParticle()); }
    let a = p.life * fAlpha * 0.6;
    fgX.beginPath();
    fgX.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    fgX.fillStyle = `hsla(${p.hue}, 100%, ${50 + p.life * 30}%, ${a})`;
    fgX.fill();
  }
}

// ============================================================
// SANSKRIT SHLOKAS — authentic verses scrolling slowly
// ============================================================
const SHLOKAS = [
  'कर्णं वन्दे महावीरं सूर्यपुत्रं महाबलम्',
  'कवचकुण्डलधारी यः दानवीरः प्रतापवान्',
  'यतो धर्मस्ततो जयः',
  'धर्मक्षेत्रे कुरुक्षेत्रे समवेता युयुत्सवः',
  'कर्मण्येवाधिकारस्ते मा फलेषु कदाचन',
  'न हि ज्ञानेन सदृशं पवित्रमिह विद्यते',
  'सत्यमेव जयते नानृतं',
  'अहिंसा परमो धर्मः',
  'योगस्थः कुरु कर्माणि सङ्गं त्यक्त्वा धनञ्जय',
  'वसुधैव कुटुम्बकम्',
  'ॐ असतो मा सद्गमय तमसो मा ज्योतिर्गमय',
  'सर्वे भवन्तु सुखिनः सर्वे सन्तु निरामयाः',
  'ॐ शान्तिः शान्तिः शान्तिः',
  'विद्या ददाति विनयं विनयाद् याति पात्रताम्',
];
let shlokaLines = [];
function initShlokas() {
  shlokaLines = [];
  let lineCount = 10;
  for (let i = 0; i < lineCount; i++) {
    shlokaLines.push({
      text: SHLOKAS[Math.floor(Math.random() * SHLOKAS.length)],
      x: W + Math.random() * W * 0.5,
      y: Math.random() * H,
      speed: Math.random() * 0.3 + 0.15,
      alpha: Math.random() * 0.15 + 0.05,
      size: Math.floor(Math.random() * 6) + 14,
    });
  }
}

function drawShlokas(t, elapsed) {
  if (elapsed < PHASE.FULL_SCENE - 1000) return;
  let rAlpha = Math.min(1, (elapsed - (PHASE.FULL_SCENE - 1000)) / 3000);
  for (let line of shlokaLines) {
    line.x -= line.speed;
    fgX.font = `${line.size}px serif`;
    let textW = fgX.measureText(line.text).width;
    if (line.x < -textW - 50) {
      line.x = W + 50 + Math.random() * 200;
      line.y = Math.random() * H;
      line.text = SHLOKAS[Math.floor(Math.random() * SHLOKAS.length)];
    }
    let a = line.alpha * rAlpha;
    // Soft edge fade at left and right
    let edgeFade = 1;
    if (line.x < 100) edgeFade = Math.max(0, line.x / 100);
    if (line.x + textW > W - 100) edgeFade = Math.min(edgeFade, Math.max(0, (W - 100 - line.x) / 200));

    fgX.fillStyle = `rgba(255, 180, 80, ${a * Math.max(0, edgeFade)})`;
    fgX.fillText(line.text, line.x, line.y);
  }
}

// ============================================================
// GOLDEN DUST — floating gold particles
// ============================================================
let goldDust = [];
function initGoldDust() {
  for (let i = 0; i < 80; i++) {
    goldDust.push({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 2 + 0.5,
      phase: Math.random() * Math.PI * 2
    });
  }
}
function drawGoldDust(t, elapsed) {
  if (elapsed < PHASE.TITLE_IN) return;
  let dAlpha = Math.min(1, (elapsed - PHASE.TITLE_IN) / 2000);
  for (let d of goldDust) {
    d.x += d.vx + Math.sin(t * 0.001 + d.phase) * 0.2;
    d.y += d.vy + Math.cos(t * 0.001 + d.phase) * 0.15;
    if (d.x < 0) d.x = W; if (d.x > W) d.x = 0;
    if (d.y < 0) d.y = H; if (d.y > H) d.y = 0;
    let a = (Math.sin(t * 0.003 + d.phase) * 0.3 + 0.5) * dAlpha;
    fgX.beginPath();
    fgX.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    fgX.fillStyle = `rgba(255, 200, 80, ${a * 0.5})`;
    fgX.fill();
    fgX.beginPath();
    fgX.arc(d.x, d.y, d.r * 3, 0, Math.PI * 2);
    fgX.fillStyle = `rgba(255, 160, 40, ${a * 0.08})`;
    fgX.fill();
  }
}

// ============================================================
// THE DIVINE ARROW — Karna's legendary Vijaya arrow
// Uses PERPENDICULAR vectors (px,py) for correct geometry
// since the arrow travels perfectly horizontal (sinA=0)
// ============================================================
let theArrow = null;
let arrowFired = false;
let arrowTrail = [];
let arrowSparks = [];

function drawArrows(t, elapsed) {
  if (elapsed < PHASE.FULL_SCENE + 2000) return;

  if (!arrowFired) {
    arrowFired = true;
    theArrow = {
      x: -400, y: H * 0.5,
      vx: 1.4, vy: 0,
      life: 1, opacity: 0,
      phase: 'flying', exitTime: 0,
    };
    arrowTrail = [];
    arrowSparks = [];
  }

  if (!theArrow || theArrow.life <= 0) return;
  let a = theArrow;

  if (a.phase === 'flying') {
    a.opacity = Math.min(1, a.opacity + 0.012);
    a.x += a.vx; a.y += a.vy;
    arrowTrail.push({ x: a.x, y: a.y });
    if (arrowTrail.length > 350) arrowTrail.shift();
    // Sparks
    if (Math.random() < 0.5) {
      arrowSparks.push({
        x: a.x - Math.random() * 30, y: a.y + (Math.random()-0.5)*20,
        vx: -Math.random()*0.5, vy: (Math.random()-0.5)*1.2 - 0.4,
        life: 1, size: Math.random()*3+1,
      });
    }
    if (a.x > W + 500) { a.phase = 'exited'; a.exitTime = t; }
  } else if (a.phase === 'exited') {
    a.opacity = Math.max(0, 1 - (t - a.exitTime) / 3000);
    if (a.opacity <= 0) a.life = 0;
    if (arrowTrail.length > 0) { arrowTrail.shift(); arrowTrail.shift(); arrowTrail.shift(); }
  }

  arrowSparks = arrowSparks.filter(s => s.life > 0);
  for (let s of arrowSparks) { s.x+=s.vx; s.y+=s.vy; s.vy+=0.025; s.life-=0.01; }

  // Direction vectors: dx,dy = forward, px,py = perpendicular (up)
  let dx = 1, dy = 0;   // Arrow points right
  let px = 0, py = -1;  // Perpendicular = up
  let op = a.opacity;

  // Helper: point along arrow from tip
  function along(dist) { return { x: a.x - dx * dist, y: a.y - dy * dist }; }
  // Helper: offset perpendicular
  function perp(bx, by, amt) { return { x: bx + px * amt, y: by + py * amt }; }

  // ==== DIVINE TRAIL — layered energy wake ====
  if (arrowTrail.length > 5) {
    let trailLayers = [
      { w: 40, a: 0.02 }, { w: 20, a: 0.04 }, { w: 8, a: 0.1 },
      { w: 3, a: 0.22 }, { w: 1, a: 0.4 }
    ];
    for (let L of trailLayers) {
      fgX.beginPath();
      fgX.moveTo(arrowTrail[0].x, arrowTrail[0].y);
      for (let i = 1; i < arrowTrail.length; i++) fgX.lineTo(arrowTrail[i].x, arrowTrail[i].y);
      let tg = fgX.createLinearGradient(arrowTrail[0].x, a.y, a.x, a.y);
      tg.addColorStop(0, 'rgba(180,80,20,0)');
      tg.addColorStop(0.3, `rgba(255,160,50,${L.a*0.3*op})`);
      tg.addColorStop(0.7, `rgba(255,210,100,${L.a*0.7*op})`);
      tg.addColorStop(1, `rgba(255,240,160,${L.a*op})`);
      fgX.strokeStyle = tg;
      fgX.lineWidth = L.w;
      fgX.lineCap = 'round';
      fgX.stroke();
    }
  }
  if (a.phase === 'exited') {
    let fade = (t - a.exitTime) / 2000;
    while (arrowTrail.length > 0 && fade > 0) { arrowTrail.shift(); fade -= 0.01; }
  }

  // ==== SHAFT — 250px long golden rod with 3D depth ====
  let shaftLen = 250;
  let shaftW = 4;
  let tip = { x: a.x, y: a.y };
  let tail = along(shaftLen);

  // Shadow
  fgX.beginPath();
  fgX.moveTo(tail.x, tail.y + 4);
  fgX.lineTo(tip.x, tip.y + 4);
  fgX.strokeStyle = `rgba(30,15,0,${0.25*op})`;
  fgX.lineWidth = shaftW + 4;
  fgX.lineCap = 'round';
  fgX.stroke();

  // Main shaft — cylindrical gradient (top-to-bottom for 3D)
  let sGrad = fgX.createLinearGradient(0, a.y - shaftW, 0, a.y + shaftW);
  sGrad.addColorStop(0, `rgba(120,80,25,${0.6*op})`);
  sGrad.addColorStop(0.25, `rgba(200,160,70,${0.9*op})`);
  sGrad.addColorStop(0.45, `rgba(250,230,160,${op})`);
  sGrad.addColorStop(0.55, `rgba(250,230,160,${op})`);
  sGrad.addColorStop(0.75, `rgba(200,160,70,${0.9*op})`);
  sGrad.addColorStop(1, `rgba(120,80,25,${0.6*op})`);
  fgX.beginPath();
  fgX.moveTo(tail.x, tail.y);
  fgX.lineTo(tip.x, tip.y);
  fgX.strokeStyle = sGrad;
  fgX.lineWidth = shaftW;
  fgX.lineCap = 'round';
  fgX.stroke();

  // Specular highlight
  fgX.beginPath();
  fgX.moveTo(tail.x, a.y - 1.2);
  fgX.lineTo(tip.x, a.y - 1.2);
  fgX.strokeStyle = `rgba(255,255,240,${0.3*op})`;
  fgX.lineWidth = 0.8;
  fgX.stroke();

  // Gold thread wrappings
  for (let n = 0; n < 10; n++) {
    let t2 = 0.1 + n * 0.08;
    let wx = tail.x + (tip.x - tail.x) * t2;
    fgX.beginPath();
    fgX.moveTo(wx, a.y - shaftW - 1);
    fgX.lineTo(wx, a.y + shaftW + 1);
    fgX.strokeStyle = `rgba(255,200,80,${0.18*op})`;
    fgX.lineWidth = 1;
    fgX.stroke();
  }

  // ==== ARROWHEAD — large leaf-blade broadhead ====
  // Using perpendicular offsets so it's actually visible!
  let headLen = 65;   // How far ahead of tip
  let headW = 22;     // Max width
  let hTip = { x: a.x + headLen, y: a.y };  // Extreme tip

  // Leaf-shaped broadhead path
  fgX.beginPath();
  fgX.moveTo(hTip.x, hTip.y);  // Sharp point
  // Upper curve
  fgX.bezierCurveTo(
    a.x + headLen * 0.6, a.y - headW * 0.9,
    a.x + headLen * 0.15, a.y - headW,
    a.x - 5, a.y - 4
  );
  // Socket notch upper
  fgX.lineTo(a.x - 12, a.y - 3);
  // Socket base
  fgX.lineTo(a.x - 12, a.y + 3);
  // Socket notch lower
  fgX.lineTo(a.x - 5, a.y + 4);
  // Lower curve
  fgX.bezierCurveTo(
    a.x + headLen * 0.15, a.y + headW,
    a.x + headLen * 0.6, a.y + headW * 0.9,
    hTip.x, hTip.y
  );
  fgX.closePath();

  // Fill — polished metal gradient top-to-bottom
  let hGrad = fgX.createLinearGradient(0, a.y - headW, 0, a.y + headW);
  hGrad.addColorStop(0, `rgba(140,100,40,${0.5*op})`);
  hGrad.addColorStop(0.2, `rgba(200,170,90,${0.8*op})`);
  hGrad.addColorStop(0.45, `rgba(255,245,200,${op})`);
  hGrad.addColorStop(0.55, `rgba(255,245,200,${op})`);
  hGrad.addColorStop(0.8, `rgba(200,170,90,${0.8*op})`);
  hGrad.addColorStop(1, `rgba(140,100,40,${0.5*op})`);
  fgX.fillStyle = hGrad;
  fgX.fill();

  // Edge outline
  fgX.strokeStyle = `rgba(255,230,160,${0.45*op})`;
  fgX.lineWidth = 1.2;
  fgX.stroke();

  // Central ridge (fuller)
  fgX.beginPath();
  fgX.moveTo(hTip.x, hTip.y);
  fgX.lineTo(a.x - 12, a.y);
  fgX.strokeStyle = `rgba(255,255,240,${0.55*op})`;
  fgX.lineWidth = 1.5;
  fgX.stroke();

  // Barbs / serrations on edges
  for (let b = 0; b < 3; b++) {
    let bt = 0.3 + b * 0.2;
    let bx = a.x + headLen * bt;
    let upperY = a.y - headW * Math.sin(bt * Math.PI) * 0.8;
    let lowerY = a.y + headW * Math.sin(bt * Math.PI) * 0.8;
    // Upper barb
    fgX.beginPath();
    fgX.moveTo(bx, upperY);
    fgX.lineTo(bx - 8, upperY - 5);
    fgX.strokeStyle = `rgba(220,180,80,${0.3*op})`;
    fgX.lineWidth = 1;
    fgX.stroke();
    // Lower barb
    fgX.beginPath();
    fgX.moveTo(bx, lowerY);
    fgX.lineTo(bx - 8, lowerY + 5);
    fgX.strokeStyle = `rgba(220,180,80,${0.3*op})`;
    fgX.lineWidth = 1;
    fgX.stroke();
  }

  // ==== FLETCHING — 4 peacock-style feathers per side ====
  for (let side = -1; side <= 1; side += 2) {
    for (let f = 0; f < 4; f++) {
      let baseX = tail.x - f * 18 - 8;
      let baseY = a.y;
      let fLen = 45 - f * 6;
      let fSpread = (16 + f * 4) * side;

      // Filled feather vane
      fgX.beginPath();
      fgX.moveTo(baseX, baseY);
      fgX.quadraticCurveTo(
        baseX - fLen * 0.5, baseY + fSpread * 1.3,
        baseX - fLen, baseY + fSpread * 0.2
      );
      fgX.quadraticCurveTo(
        baseX - fLen * 0.5, baseY + fSpread * 0.5,
        baseX, baseY
      );
      fgX.closePath();
      // Iridescent fill
      let fColor = f < 2
        ? `rgba(60,160,90,${0.1*op})`
        : `rgba(80,140,180,${0.08*op})`;
      fgX.fillStyle = fColor;
      fgX.fill();

      // Spine
      fgX.beginPath();
      fgX.moveTo(baseX, baseY);
      fgX.quadraticCurveTo(
        baseX - fLen * 0.5, baseY + fSpread * 1.3,
        baseX - fLen, baseY + fSpread * 0.2
      );
      fgX.strokeStyle = `rgba(200,165,75,${(0.45 - f*0.08)*op})`;
      fgX.lineWidth = 1.4 - f * 0.2;
      fgX.stroke();

      // Barb lines
      for (let b = 0; b < 4; b++) {
        let bt = 0.2 + b * 0.2;
        let bpx = baseX + (baseX - fLen - baseX) * bt;
        let bpy = baseY + fSpread * (1.3 * bt * (1-bt) * 4) * 0.3;
        fgX.beginPath();
        fgX.moveTo(bpx, bpy);
        fgX.lineTo(bpx, bpy + fSpread * 0.3);
        fgX.strokeStyle = `rgba(180,150,70,${0.12*op})`;
        fgX.lineWidth = 0.5;
        fgX.stroke();
      }
    }
  }

  // Nock — ornate rear end
  let nX = tail.x - 10, nY = a.y;
  fgX.beginPath();
  fgX.arc(nX, nY, 5, 0, Math.PI * 2);
  fgX.fillStyle = `rgba(200,160,80,${0.3*op})`;
  fgX.fill();
  fgX.strokeStyle = `rgba(255,220,130,${0.25*op})`;
  fgX.lineWidth = 1.2;
  fgX.stroke();
  // V-notch
  fgX.beginPath();
  fgX.moveTo(nX - 8, nY - 5);
  fgX.lineTo(nX - 3, nY);
  fgX.lineTo(nX - 8, nY + 5);
  fgX.strokeStyle = `rgba(180,140,60,${0.3*op})`;
  fgX.lineWidth = 1.2;
  fgX.stroke();

  // ==== SPARKS ====
  for (let s of arrowSparks) {
    let so = s.life * op;
    fgX.beginPath();
    fgX.arc(s.x, s.y, s.size, 0, Math.PI*2);
    fgX.fillStyle = `rgba(255,220,100,${so*0.7})`;
    fgX.fill();
    let sg2 = fgX.createRadialGradient(s.x,s.y,0,s.x,s.y,s.size*4);
    sg2.addColorStop(0, `rgba(255,200,80,${so*0.2})`);
    sg2.addColorStop(1, 'rgba(255,160,40,0)');
    fgX.beginPath();
    fgX.arc(s.x, s.y, s.size*4, 0, Math.PI*2);
    fgX.fillStyle = sg2;
    fgX.fill();
  }

  // ==== TIP GLOW — divine radiance ====
  let tx = hTip.x, ty = hTip.y;
  let layers = [[22, 0.5, '255,255,240'], [50, 0.15, '255,210,100'], [100, 0.06, '255,180,60']];
  for (let [r, al, c] of layers) {
    let g = fgX.createRadialGradient(tx,ty,0,tx,ty,r);
    g.addColorStop(0, `rgba(${c},${al*op})`);
    g.addColorStop(1, `rgba(${c},0)`);
    fgX.beginPath();
    fgX.arc(tx,ty,r,0,Math.PI*2);
    fgX.fillStyle = g;
    fgX.fill();
  }

  // Pulsing sacred ring
  let rp = Math.sin(t*0.004)*0.5+0.5;
  fgX.beginPath();
  fgX.arc(tx, ty, 22+rp*15, 0, Math.PI*2);
  fgX.strokeStyle = `rgba(255,230,150,${0.15*op*rp})`;
  fgX.lineWidth = 1.5;
  fgX.stroke();
}

// ============================================================
// SACRED GEOMETRY — Sudarshan Chakra style rotating pattern
// ============================================================
function drawChakra(t, elapsed) { return; }

// ============================================================
// DIVINE SHIELD — Kavach Kundal shimmer effect on title
// ============================================================
function drawShield(t, elapsed) {
  if (elapsed < PHASE.TITLE_IN) return;
  let sAlpha = Math.min(0.3, (elapsed - PHASE.TITLE_IN) / 3000 * 0.3);
  let shimmer = Math.sin(t * 0.002) * 0.5 + 0.5;

  // Golden aura around center
  let aGrad = fgX.createRadialGradient(cx, cy, 20, cx, cy, Math.min(W, H) * 0.35);
  aGrad.addColorStop(0, `rgba(255, 200, 80, ${sAlpha * shimmer * 0.15})`);
  aGrad.addColorStop(0.5, `rgba(255, 140, 0, ${sAlpha * 0.05})`);
  aGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  fgX.fillStyle = aGrad;
  fgX.fillRect(0, 0, W, H);
}

// ============================================================
// TEMPLE PILLARS — decorative side columns
// ============================================================
function drawPillars(t, elapsed) {
  if (elapsed < PHASE.FULL_SCENE) return;
  let pAlpha = Math.min(0.12, (elapsed - PHASE.FULL_SCENE) / 4000 * 0.12);

  // Left pillar
  let pillarW = 30;
  let grad = fgX.createLinearGradient(0, 0, pillarW, 0);
  grad.addColorStop(0, `rgba(180, 120, 40, ${pAlpha})`);
  grad.addColorStop(0.5, `rgba(255, 180, 80, ${pAlpha * 0.6})`);
  grad.addColorStop(1, `rgba(120, 80, 20, ${pAlpha * 0.3})`);
  fgX.fillStyle = grad;
  fgX.fillRect(W * 0.05, H * 0.15, pillarW, H * 0.7);
  fgX.fillRect(W * 0.95 - pillarW, H * 0.15, pillarW, H * 0.7);

  // Pillar carvings (horizontal lines)
  for (let y = H * 0.15; y < H * 0.85; y += 25) {
    fgX.beginPath();
    fgX.moveTo(W * 0.05, y);
    fgX.lineTo(W * 0.05 + pillarW, y);
    fgX.moveTo(W * 0.95 - pillarW, y);
    fgX.lineTo(W * 0.95, y);
    fgX.strokeStyle = `rgba(255, 200, 100, ${pAlpha * 0.5})`;
    fgX.lineWidth = 0.5;
    fgX.stroke();
  }

  // Pillar caps — ornate top pieces
  for (let px of [W * 0.05, W * 0.95 - pillarW]) {
    fgX.beginPath();
    fgX.moveTo(px - 8, H * 0.15);
    fgX.lineTo(px + pillarW / 2, H * 0.12);
    fgX.lineTo(px + pillarW + 8, H * 0.15);
    fgX.closePath();
    fgX.fillStyle = `rgba(220, 160, 60, ${pAlpha})`;
    fgX.fill();
  }
}

// ============================================================
// BATTLE EMBERS — rising from bottom
// ============================================================
let embers = [];
function initEmbers() {
  for (let i = 0; i < 60; i++) {
    embers.push({
      x: Math.random() * W,
      y: H + Math.random() * 100,
      vx: (Math.random() - 0.5) * 1,
      vy: -(Math.random() * 1.5 + 0.3),
      r: Math.random() * 2 + 0.5,
      life: Math.random(),
      drift: Math.random() * Math.PI * 2
    });
  }
}
function drawEmbers(t, elapsed) {
  if (elapsed < PHASE.SUNBURST) return;
  let eAlpha = Math.min(1, (elapsed - PHASE.SUNBURST) / 3000);
  for (let e of embers) {
    e.x += e.vx + Math.sin(t * 0.001 + e.drift) * 0.5;
    e.y += e.vy;
    e.life -= 0.002;
    if (e.life <= 0 || e.y < -20) {
      e.x = Math.random() * W;
      e.y = H + 20;
      e.life = 1;
    }
    let a = e.life * eAlpha * 0.7;
    fgX.beginPath();
    fgX.arc(e.x, e.y, e.r * e.life, 0, Math.PI * 2);
    fgX.fillStyle = `rgba(255, ${100 + Math.floor(e.life * 100)}, 20, ${a})`;
    fgX.fill();
  }
}

// ============================================================
// SUNBURST FLASH — cinematic light explosion
// ============================================================
function drawSunburst(t, elapsed) {
  if (elapsed < PHASE.SUNBURST || elapsed > PHASE.SUNBURST + 3000) return;
  let progress = (elapsed - PHASE.SUNBURST) / 3000;
  let flash = Math.max(0, 1 - progress * 1.5);

  if (flash > 0) {
    let grad = bgX.createRadialGradient(cx, cy * 0.5, 0, cx, cy * 0.5, Math.max(W, H));
    grad.addColorStop(0, `rgba(255, 240, 200, ${flash * 0.8})`);
    grad.addColorStop(0.2, `rgba(255, 180, 50, ${flash * 0.4})`);
    grad.addColorStop(0.5, `rgba(200, 100, 0, ${flash * 0.1})`);
    grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
    bgX.fillStyle = grad;
    bgX.fillRect(0, 0, W, H);
  }

  let ringR = progress * Math.max(W, H) * 0.8;
  bgX.beginPath();
  bgX.arc(cx, cy * 0.5, ringR, 0, Math.PI * 2);
  bgX.strokeStyle = `rgba(255, 180, 60, ${(1 - progress) * 0.3})`;
  bgX.lineWidth = 3 * (1 - progress);
  bgX.stroke();
}

// ============================================================
// BOTTOM FLAME GLOW — ground fire effect
// ============================================================
function drawGroundFire(t, elapsed) {
  if (elapsed < PHASE.FULL_SCENE - 2000) return;
  let gAlpha = Math.min(0.4, (elapsed - (PHASE.FULL_SCENE - 2000)) / 3000 * 0.4);
  let grad = bgX.createLinearGradient(0, H, 0, H * 0.7);
  grad.addColorStop(0, `rgba(180, 60, 0, ${gAlpha * 0.3})`);
  grad.addColorStop(0.3, `rgba(120, 30, 0, ${gAlpha * 0.1})`);
  grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  bgX.fillStyle = grad;
  bgX.fillRect(0, H * 0.7, W, H * 0.3);
}

// ============================================================
// CHARIOT WHEEL — Premium Golden Chariot Wheel (Ratha Chakra)
// Authentic ancient Indian chariot wheel with rich golden detail
// ============================================================
function drawChariotWheel(t, elapsed) {
  if (elapsed < PHASE.SUNBURST) return;
  let wAlpha = Math.min(0.38, (elapsed - PHASE.SUNBURST) / 5000 * 0.38);
  let wr = Math.min(W, H) * 0.40;

  // ==== BACKGROUND GOLDEN AURA ====
  let auraGrad = fgX.createRadialGradient(wheelCx, wheelCy, wr * 0.1, wheelCx, wheelCy, wr * 1.4);
  auraGrad.addColorStop(0, `rgba(255, 200, 80, ${wAlpha * 0.18})`);
  auraGrad.addColorStop(0.3, `rgba(220, 160, 40, ${wAlpha * 0.10})`);
  auraGrad.addColorStop(0.6, `rgba(180, 120, 20, ${wAlpha * 0.04})`);
  auraGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  fgX.fillStyle = auraGrad;
  fgX.beginPath();
  fgX.arc(wheelCx, wheelCy, wr * 1.4, 0, Math.PI * 2);
  fgX.fill();

  fgX.save();
  fgX.translate(wheelCx, wheelCy);
  fgX.rotate(t * 0.00006);  // Very slow majestic rotation

  // Golden color palette
  let goldBright = `rgba(255, 215, 80, ${wAlpha})`;
  let goldMid    = `rgba(218, 165, 32, ${wAlpha})`;
  let goldDark   = `rgba(160, 110, 20, ${wAlpha})`;
  let goldGlow   = `rgba(255, 230, 130, ${wAlpha * 0.7})`;
  let goldDeep   = `rgba(139, 90, 10, ${wAlpha * 0.8})`;

  // ==== OUTER RIM — thick carved golden band ====
  // Outer edge ring
  fgX.beginPath();
  fgX.arc(0, 0, wr, 0, Math.PI * 2);
  fgX.lineWidth = 6;
  let rimGradO = fgX.createRadialGradient(0, 0, wr * 0.97, 0, 0, wr * 1.02);
  rimGradO.addColorStop(0, `rgba(255, 220, 100, ${wAlpha})`);
  rimGradO.addColorStop(0.5, `rgba(218, 165, 32, ${wAlpha})`);
  rimGradO.addColorStop(1, `rgba(160, 110, 20, ${wAlpha})`);
  fgX.strokeStyle = rimGradO;
  fgX.stroke();

  // Rim band fill (thick golden tyre)
  let bandOuter = wr;
  let bandInner = wr * 0.91;
  fgX.beginPath();
  fgX.arc(0, 0, bandOuter, 0, Math.PI * 2);
  fgX.arc(0, 0, bandInner, 0, Math.PI * 2, true);
  let bandGrad = fgX.createRadialGradient(0, 0, bandInner, 0, 0, bandOuter);
  bandGrad.addColorStop(0, `rgba(180, 130, 30, ${wAlpha * 0.6})`);
  bandGrad.addColorStop(0.3, `rgba(218, 175, 55, ${wAlpha * 0.45})`);
  bandGrad.addColorStop(0.7, `rgba(255, 210, 90, ${wAlpha * 0.5})`);
  bandGrad.addColorStop(1, `rgba(180, 130, 30, ${wAlpha * 0.55})`);
  fgX.fillStyle = bandGrad;
  fgX.fill();

  // Inner edge of rim band
  fgX.beginPath();
  fgX.arc(0, 0, bandInner, 0, Math.PI * 2);
  fgX.lineWidth = 2;
  fgX.strokeStyle = goldBright;
  fgX.stroke();

  // Carved pattern on rim — repeating lotus petal arcs
  let petalCount = 36;
  for (let i = 0; i < petalCount; i++) {
    let a = (i / petalCount) * Math.PI * 2;
    let aNext = ((i + 1) / petalCount) * Math.PI * 2;
    let aMid = (a + aNext) / 2;
    let rimMid = (bandOuter + bandInner) / 2;
    let petalH = (bandOuter - bandInner) * 0.35;
    // Small scallop/petal indent on each section
    let px1 = Math.cos(a) * rimMid, py1 = Math.sin(a) * rimMid;
    let px2 = Math.cos(aNext) * rimMid, py2 = Math.sin(aNext) * rimMid;
    let cpx = Math.cos(aMid) * (rimMid - petalH), cpy = Math.sin(aMid) * (rimMid - petalH);
    fgX.beginPath();
    fgX.moveTo(px1, py1);
    fgX.quadraticCurveTo(cpx, cpy, px2, py2);
    fgX.strokeStyle = `rgba(255, 220, 100, ${wAlpha * 0.3})`;
    fgX.lineWidth = 0.8;
    fgX.stroke();
  }

  // Decorative studs on outer rim
  let studCount = 24;
  for (let i = 0; i < studCount; i++) {
    let a = (i / studCount) * Math.PI * 2;
    let sr = (bandOuter + bandInner) / 2;
    let sx = Math.cos(a) * sr, sy = Math.sin(a) * sr;
    fgX.beginPath();
    fgX.arc(sx, sy, 2.5, 0, Math.PI * 2);
    let studGrad = fgX.createRadialGradient(sx - 0.5, sy - 0.5, 0, sx, sy, 2.5);
    studGrad.addColorStop(0, `rgba(255, 240, 160, ${wAlpha * 0.8})`);
    studGrad.addColorStop(1, `rgba(200, 150, 40, ${wAlpha * 0.4})`);
    fgX.fillStyle = studGrad;
    fgX.fill();
  }

  // ==== SPOKES — 16 ornate golden spokes with leaf pattern ====
  let spokeCount = 16;
  let hubR = wr * 0.18;
  let spokeRimR = bandInner - 2;

  for (let i = 0; i < spokeCount; i++) {
    let ang = (i / spokeCount) * Math.PI * 2;
    let cosA = Math.cos(ang), sinA = Math.sin(ang);
    let perpX = -sinA, perpY = cosA;

    // Main spoke — thick golden bar with taper
    let hx = cosA * hubR, hy = sinA * hubR;
    let rx = cosA * spokeRimR, ry = sinA * spokeRimR;

    // Spoke width tapers from hub to rim
    let wHub = wr * 0.025;
    let wRim = wr * 0.012;

    // Draw spoke as filled trapezoid
    fgX.beginPath();
    fgX.moveTo(hx + perpX * wHub, hy + perpY * wHub);
    fgX.lineTo(rx + perpX * wRim, ry + perpY * wRim);
    fgX.lineTo(rx - perpX * wRim, ry - perpY * wRim);
    fgX.lineTo(hx - perpX * wHub, hy - perpY * wHub);
    fgX.closePath();

    // Golden gradient along spoke length
    let spokeGrad = fgX.createLinearGradient(hx, hy, rx, ry);
    spokeGrad.addColorStop(0, `rgba(255, 220, 100, ${wAlpha * 0.9})`);
    spokeGrad.addColorStop(0.3, `rgba(218, 175, 55, ${wAlpha * 0.7})`);
    spokeGrad.addColorStop(0.7, `rgba(200, 155, 40, ${wAlpha * 0.6})`);
    spokeGrad.addColorStop(1, `rgba(255, 210, 80, ${wAlpha * 0.8})`);
    fgX.fillStyle = spokeGrad;
    fgX.fill();

    // Spoke edge highlight
    fgX.strokeStyle = `rgba(255, 230, 130, ${wAlpha * 0.4})`;
    fgX.lineWidth = 0.6;
    fgX.stroke();

    // Leaf/petal motif at spoke midpoint
    let midR = wr * 0.52;
    let mx = cosA * midR, my = sinA * midR;
    let leafLen = wr * 0.07;
    let leafW = wr * 0.02;

    fgX.beginPath();
    fgX.moveTo(mx - cosA * leafLen, my - sinA * leafLen);
    fgX.quadraticCurveTo(mx + perpX * leafW, my + perpY * leafW, mx + cosA * leafLen, my + sinA * leafLen);
    fgX.quadraticCurveTo(mx - perpX * leafW, my - perpY * leafW, mx - cosA * leafLen, my - sinA * leafLen);
    fgX.closePath();
    fgX.fillStyle = `rgba(255, 215, 80, ${wAlpha * 0.35})`;
    fgX.fill();
    fgX.strokeStyle = `rgba(255, 230, 140, ${wAlpha * 0.4})`;
    fgX.lineWidth = 0.5;
    fgX.stroke();

    // Diamond jewel at 70% radius
    let jewR = wr * 0.72;
    let jx = cosA * jewR, jy = sinA * jewR;
    let jSize = wr * 0.012;
    fgX.beginPath();
    fgX.moveTo(jx + cosA * jSize, jy + sinA * jSize);
    fgX.lineTo(jx + perpX * jSize * 0.6, jy + perpY * jSize * 0.6);
    fgX.lineTo(jx - cosA * jSize, jy - sinA * jSize);
    fgX.lineTo(jx - perpX * jSize * 0.6, jy - perpY * jSize * 0.6);
    fgX.closePath();
    fgX.fillStyle = `rgba(255, 230, 120, ${wAlpha * 0.5})`;
    fgX.fill();
  }

  // ==== INNER DECORATIVE RINGS ====
  // Ornate ring at 82%
  fgX.beginPath();
  fgX.arc(0, 0, wr * 0.82, 0, Math.PI * 2);
  fgX.strokeStyle = `rgba(218, 175, 55, ${wAlpha * 0.5})`;
  fgX.lineWidth = 1.5;
  fgX.stroke();

  // Dotted ring at 78% — tiny pearls
  let pearlCount = 48;
  for (let i = 0; i < pearlCount; i++) {
    let a = (i / pearlCount) * Math.PI * 2;
    let px = Math.cos(a) * wr * 0.78, py = Math.sin(a) * wr * 0.78;
    fgX.beginPath();
    fgX.arc(px, py, 1.2, 0, Math.PI * 2);
    fgX.fillStyle = `rgba(255, 225, 120, ${wAlpha * 0.35})`;
    fgX.fill();
  }

  // Ring at 55%
  fgX.beginPath();
  fgX.arc(0, 0, wr * 0.55, 0, Math.PI * 2);
  fgX.strokeStyle = `rgba(218, 175, 55, ${wAlpha * 0.35})`;
  fgX.lineWidth = 1;
  fgX.stroke();

  // Ring at 35%
  fgX.beginPath();
  fgX.arc(0, 0, wr * 0.35, 0, Math.PI * 2);
  fgX.strokeStyle = `rgba(200, 155, 45, ${wAlpha * 0.3})`;
  fgX.lineWidth = 0.8;
  fgX.stroke();

  // ==== LOTUS HUB — ornate central hub with lotus design ====
  let hubOuter = wr * 0.22;
  let hubMid = wr * 0.15;
  let hubInner = wr * 0.08;

  // Hub outer glow ring
  fgX.beginPath();
  fgX.arc(0, 0, hubOuter + 3, 0, Math.PI * 2);
  fgX.strokeStyle = `rgba(255, 220, 100, ${wAlpha * 0.3})`;
  fgX.lineWidth = 5;
  fgX.stroke();

  // Hub outer band — gradient filled
  fgX.beginPath();
  fgX.arc(0, 0, hubOuter, 0, Math.PI * 2);
  fgX.arc(0, 0, hubMid, 0, Math.PI * 2, true);
  let hubBandGrad = fgX.createRadialGradient(0, 0, hubMid, 0, 0, hubOuter);
  hubBandGrad.addColorStop(0, `rgba(200, 160, 50, ${wAlpha * 0.7})`);
  hubBandGrad.addColorStop(0.5, `rgba(255, 215, 80, ${wAlpha * 0.8})`);
  hubBandGrad.addColorStop(1, `rgba(180, 130, 30, ${wAlpha * 0.65})`);
  fgX.fillStyle = hubBandGrad;
  fgX.fill();

  // Hub outer stroke
  fgX.beginPath();
  fgX.arc(0, 0, hubOuter, 0, Math.PI * 2);
  fgX.strokeStyle = goldBright;
  fgX.lineWidth = 2;
  fgX.stroke();

  // Lotus petals around hub (8 petals)
  let lotusPetals = 8;
  for (let i = 0; i < lotusPetals; i++) {
    let a = (i / lotusPetals) * Math.PI * 2;
    let cosP = Math.cos(a), sinP = Math.sin(a);
    let perpPX = -sinP, perpPY = cosP;
    let petalBase = hubMid * 0.9;
    let petalTip = hubOuter * 0.95;
    let petalW = hubOuter * 0.28;

    fgX.beginPath();
    fgX.moveTo(cosP * petalBase, sinP * petalBase);
    fgX.quadraticCurveTo(
      cosP * (petalBase + petalTip) / 2 + perpPX * petalW,
      sinP * (petalBase + petalTip) / 2 + perpPY * petalW,
      cosP * petalTip, sinP * petalTip
    );
    fgX.quadraticCurveTo(
      cosP * (petalBase + petalTip) / 2 - perpPX * petalW,
      sinP * (petalBase + petalTip) / 2 - perpPY * petalW,
      cosP * petalBase, sinP * petalBase
    );
    fgX.fillStyle = `rgba(255, 220, 100, ${wAlpha * 0.45})`;
    fgX.fill();
    fgX.strokeStyle = `rgba(255, 235, 150, ${wAlpha * 0.5})`;
    fgX.lineWidth = 0.6;
    fgX.stroke();
  }

  // Hub mid ring
  fgX.beginPath();
  fgX.arc(0, 0, hubMid, 0, Math.PI * 2);
  fgX.strokeStyle = goldBright;
  fgX.lineWidth = 1.5;
  fgX.stroke();

  // Hub inner fill — rich gold gradient center
  let centerGrad = fgX.createRadialGradient(0, -2, 0, 0, 0, hubInner);
  centerGrad.addColorStop(0, `rgba(255, 240, 170, ${wAlpha * 0.9})`);
  centerGrad.addColorStop(0.4, `rgba(255, 215, 80, ${wAlpha * 0.7})`);
  centerGrad.addColorStop(1, `rgba(200, 155, 40, ${wAlpha * 0.5})`);
  fgX.beginPath();
  fgX.arc(0, 0, hubInner, 0, Math.PI * 2);
  fgX.fillStyle = centerGrad;
  fgX.fill();
  fgX.strokeStyle = goldBright;
  fgX.lineWidth = 1.5;
  fgX.stroke();

  // Hub decorative dots (8 around inner hub)
  for (let i = 0; i < 8; i++) {
    let a = (i / 8) * Math.PI * 2;
    let dx = Math.cos(a) * hubMid * 0.75;
    let dy = Math.sin(a) * hubMid * 0.75;
    fgX.beginPath();
    fgX.arc(dx, dy, 2, 0, Math.PI * 2);
    let dotGrad = fgX.createRadialGradient(dx - 0.3, dy - 0.3, 0, dx, dy, 2);
    dotGrad.addColorStop(0, `rgba(255, 240, 160, ${wAlpha * 0.8})`);
    dotGrad.addColorStop(1, `rgba(218, 175, 55, ${wAlpha * 0.4})`);
    fgX.fillStyle = dotGrad;
    fgX.fill();
  }

  // Hub center jewel — bright golden point
  fgX.beginPath();
  fgX.arc(0, 0, wr * 0.025, 0, Math.PI * 2);
  let jewGrad = fgX.createRadialGradient(0, -1, 0, 0, 0, wr * 0.025);
  jewGrad.addColorStop(0, `rgba(255, 250, 200, ${wAlpha * 1.2})`);
  jewGrad.addColorStop(0.5, `rgba(255, 220, 100, ${wAlpha})`);
  jewGrad.addColorStop(1, `rgba(200, 160, 40, ${wAlpha * 0.7})`);
  fgX.fillStyle = jewGrad;
  fgX.fill();

  // ==== FELLY — carved arcs between spokes ====
  for (let i = 0; i < spokeCount; i++) {
    let a1 = (i / spokeCount) * Math.PI * 2;
    let aMid = ((i + 0.5) / spokeCount) * Math.PI * 2;
    let a2 = ((i + 1) / spokeCount) * Math.PI * 2;
    let fellR = wr * 0.86;
    let fellInner = wr * 0.84;

    // Decorative arc between spokes
    fgX.beginPath();
    fgX.arc(0, 0, fellR, a1 + 0.04, a2 - 0.04);
    fgX.strokeStyle = `rgba(218, 175, 55, ${wAlpha * 0.4})`;
    fgX.lineWidth = 2;
    fgX.stroke();

    // Small inward scallop
    let scx = Math.cos(aMid) * fellInner, scy = Math.sin(aMid) * fellInner;
    fgX.beginPath();
    fgX.arc(scx, scy, wr * 0.015, 0, Math.PI * 2);
    fgX.fillStyle = `rgba(255, 215, 80, ${wAlpha * 0.25})`;
    fgX.fill();
  }

  fgX.restore();
}

// ============================================================
// ROYAL SEAL — Surya's Sun Wheel watermark behind title
// ============================================================
function drawRoyalSeal(t, elapsed) {
  if (elapsed < PHASE.TITLE_IN) return;
  let sealAlpha = Math.min(0.06, (elapsed - PHASE.TITLE_IN) / 6000 * 0.06);
  let sealR = Math.min(W, H) * 0.22;

  fgX.save();
  fgX.translate(cx, cy);
  fgX.rotate(t * 0.00015);
  fgX.globalAlpha = sealAlpha;

  // Outer rim
  fgX.beginPath();
  fgX.arc(0, 0, sealR, 0, Math.PI * 2);
  fgX.strokeStyle = 'rgba(255,180,60,1)';
  fgX.lineWidth = 2;
  fgX.stroke();

  // Second rim
  fgX.beginPath();
  fgX.arc(0, 0, sealR * 0.92, 0, Math.PI * 2);
  fgX.lineWidth = 0.5;
  fgX.stroke();

  // Sun rays — 32 pointed star
  let rays = 32;
  for (let i = 0; i < rays; i++) {
    let ang = (i / rays) * Math.PI * 2;
    let inner = sealR * (i % 2 === 0 ? 0.55 : 0.7);
    fgX.beginPath();
    fgX.moveTo(Math.cos(ang) * inner, Math.sin(ang) * inner);
    fgX.lineTo(Math.cos(ang) * sealR * 0.9, Math.sin(ang) * sealR * 0.9);
    fgX.strokeStyle = 'rgba(255,200,80,1)';
    fgX.lineWidth = i % 2 === 0 ? 1.5 : 0.6;
    fgX.stroke();
  }

  // Lotus petals inner ring
  let petals = 16;
  for (let i = 0; i < petals; i++) {
    let ang = (i / petals) * Math.PI * 2;
    let pr = sealR * 0.4;
    fgX.beginPath();
    fgX.ellipse(
      Math.cos(ang) * pr * 0.5, Math.sin(ang) * pr * 0.5,
      pr * 0.22, pr * 0.08, ang, 0, Math.PI * 2
    );
    fgX.strokeStyle = 'rgba(255,180,60,1)';
    fgX.lineWidth = 0.8;
    fgX.stroke();
  }

  // Center dot
  fgX.beginPath();
  fgX.arc(0, 0, sealR * 0.08, 0, Math.PI * 2);
  fgX.fillStyle = 'rgba(255,200,80,1)';
  fgX.fill();

  fgX.globalAlpha = 1;
  fgX.restore();
}

// ============================================================
// SANSKRIT ORNAMENTAL BORDERS — along screen edges
// ============================================================
const BORDER_CHARS = 'ॐ ☸ ❖ ◆ ✦ ꕥ ⊹ ❋ ◇ ✧'.split(' ');
function drawSanskritBorders(t, elapsed) {
  if (elapsed < PHASE.FULL_SCENE) return;
  let bAlpha = Math.min(0.12, (elapsed - PHASE.FULL_SCENE) / 5000 * 0.12);

  // Top border line
  fgX.beginPath();
  fgX.moveTo(W * 0.08, H * 0.06);
  fgX.lineTo(W * 0.92, H * 0.06);
  let tGrad = fgX.createLinearGradient(W * 0.08, 0, W * 0.92, 0);
  tGrad.addColorStop(0, 'rgba(255,160,40,0)');
  tGrad.addColorStop(0.3, `rgba(255,180,60,${bAlpha})`);
  tGrad.addColorStop(0.7, `rgba(255,180,60,${bAlpha})`);
  tGrad.addColorStop(1, 'rgba(255,160,40,0)');
  fgX.strokeStyle = tGrad;
  fgX.lineWidth = 0.5;
  fgX.stroke();

  // Bottom border line
  fgX.beginPath();
  fgX.moveTo(W * 0.08, H * 0.94);
  fgX.lineTo(W * 0.92, H * 0.94);
  fgX.strokeStyle = tGrad;
  fgX.stroke();

  // Ornamental symbols along top & bottom
  fgX.font = '10px serif';
  let spacing = W * 0.84 / 20;
  for (let i = 0; i < 20; i++) {
    let sx = W * 0.08 + i * spacing + spacing * 0.5;
    let ch = BORDER_CHARS[i % BORDER_CHARS.length];
    let shimmer = Math.sin(t * 0.002 + i * 0.5) * 0.3 + 0.7;
    fgX.fillStyle = `rgba(255,180,60,${bAlpha * shimmer})`;
    fgX.textAlign = 'center';
    fgX.fillText(ch, sx, H * 0.06 - 6);
    fgX.fillText(ch, sx, H * 0.94 + 14);
  }

  // Corner ornaments (all 4 corners)
  let cornerR = 25;
  let corners = [
    [W * 0.08, H * 0.06], [W * 0.92, H * 0.06],
    [W * 0.08, H * 0.94], [W * 0.92, H * 0.94]
  ];
  for (let [ccx, ccy] of corners) {
    fgX.beginPath();
    fgX.arc(ccx, ccy, cornerR, 0, Math.PI * 2);
    fgX.strokeStyle = `rgba(255,180,60,${bAlpha * 0.6})`;
    fgX.lineWidth = 0.5;
    fgX.stroke();
    fgX.font = '12px serif';
    fgX.fillStyle = `rgba(255,200,80,${bAlpha})`;
    fgX.textAlign = 'center';
    fgX.textBaseline = 'middle';
    fgX.fillText('ॐ', ccx, ccy);
  }
  fgX.textBaseline = 'alphabetic';
}

// ============================================================
// PARALLAX — mouse tracking for 3D depth
// ============================================================
let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / W - 0.5) * 2;  // -1 to 1
  mouseY = (e.clientY / H - 0.5) * 2;
});

function applyParallax() {
  let title = document.getElementById('title-container');
  let tx = mouseX * -8;
  let ty = mouseY * -6;
  title.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px))`;
}

// ============================================================
// EMBER TRAILS — particles from ENTER button on hover
// ============================================================
let emberParticles = [];
let isHoveringBtn = false;

document.getElementById('enter-btn').addEventListener('mouseenter', () => { isHoveringBtn = true; });
document.getElementById('enter-btn').addEventListener('mouseleave', () => { isHoveringBtn = false; });

function drawEmberTrails(t) {
  let btn = document.getElementById('enter-btn');
  if (isHoveringBtn) {
    let rect = btn.getBoundingClientRect();
    for (let i = 0; i < 2; i++) {
      emberParticles.push({
        x: rect.left + Math.random() * rect.width,
        y: rect.top + Math.random() * 5,
        vx: (Math.random() - 0.5) * 1.5,
        vy: -(Math.random() * 2 + 1),
        life: 1, size: Math.random() * 3 + 1,
        hue: 20 + Math.random() * 30,
      });
    }
  }
  emberParticles = emberParticles.filter(p => p.life > 0);
  for (let p of emberParticles) {
    p.x += p.vx + Math.sin(t * 0.005 + p.x * 0.02) * 0.5;
    p.y += p.vy;
    p.life -= 0.015;
    let a = p.life * 0.8;
    fgX.beginPath();
    fgX.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    fgX.fillStyle = `hsla(${p.hue}, 100%, ${50 + p.life * 30}%, ${a})`;
    fgX.fill();
    // Glow
    let eg = fgX.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 3);
    eg.addColorStop(0, `rgba(255,180,60,${a*0.3})`);
    eg.addColorStop(1, 'rgba(255,120,20,0)');
    fgX.beginPath();
    fgX.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
    fgX.fillStyle = eg;
    fgX.fill();
  }
}

// ============================================================
// AUDIO AMBIENCE — cinematic drone + war conch on first click
// ============================================================
let audioCtx = null;
let audioStarted = false;

function startAmbience() {
  if (audioStarted) return;
  audioStarted = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Deep drone
  let drone = audioCtx.createOscillator();
  let droneGain = audioCtx.createGain();
  drone.type = 'sine';
  drone.frequency.value = 55;  // Low A
  droneGain.gain.value = 0;
  droneGain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 3);
  drone.connect(droneGain);
  droneGain.connect(audioCtx.destination);
  drone.start();

  // Secondary harmonic
  let drone2 = audioCtx.createOscillator();
  let drone2Gain = audioCtx.createGain();
  drone2.type = 'sine';
  drone2.frequency.value = 110;
  drone2Gain.gain.value = 0;
  drone2Gain.gain.linearRampToValueAtTime(0.03, audioCtx.currentTime + 4);
  drone2.connect(drone2Gain);
  drone2Gain.connect(audioCtx.destination);
  drone2.start();

  // War conch (shankha) — filtered noise burst
  let bufferSize = audioCtx.sampleRate * 1.5;
  let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  let data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    let env = Math.exp(-i / (audioCtx.sampleRate * 0.6));
    data[i] = (Math.random() * 2 - 1) * env;
  }
  let conch = audioCtx.createBufferSource();
  conch.buffer = buffer;
  let bandpass = audioCtx.createBiquadFilter();
  bandpass.type = 'bandpass';
  bandpass.frequency.value = 300;
  bandpass.Q.value = 2;
  let conchGain = audioCtx.createGain();
  conchGain.gain.value = 0.1;
  conch.connect(bandpass);
  bandpass.connect(conchGain);
  conchGain.connect(audioCtx.destination);
  conch.start(audioCtx.currentTime + 0.2);
}

document.addEventListener('click', startAmbience, { once: true });
document.addEventListener('touchstart', startAmbience, { once: true });

// ============================================================
// CINEMATIC CONTROLLER — manages intro sequence
// ============================================================
function updateCinematic(elapsed) {
  let overlay = document.getElementById('cinematic-overlay');
  let verse = document.getElementById('sanskrit-verse');
  let title = document.getElementById('title-container');
  let enterBtn = document.getElementById('enter-btn');
  let enterLine = document.querySelector('.enter-line');

  // Verse animation
  if (elapsed > PHASE.VERSE_IN && elapsed < PHASE.VERSE_OUT) {
    let vIn = Math.min(1, (elapsed - PHASE.VERSE_IN) / 1200);
    verse.style.opacity = vIn;
  } else if (elapsed >= PHASE.VERSE_OUT) {
    let vOut = Math.max(0, 1 - (elapsed - PHASE.VERSE_OUT) / 800);
    verse.style.opacity = vOut;
  }

  // Overlay fade (reveal the scene)
  if (elapsed > PHASE.SUNBURST) {
    let oFade = Math.min(1, (elapsed - PHASE.SUNBURST) / 2000);
    overlay.style.opacity = 1 - oFade;
    if (oFade >= 1) overlay.style.display = 'none';
  }

  // Title reveal
  if (elapsed > PHASE.TITLE_IN) {
    let tIn = Math.min(1, (elapsed - PHASE.TITLE_IN) / 1500);
    title.style.opacity = tIn;
  }

  // Enter button — positioned below the chariot wheel
  if (elapsed > PHASE.FULL_SCENE + 1000) {
    let bIn = Math.min(1, (elapsed - PHASE.FULL_SCENE - 1000) / 1500);
    enterBtn.style.opacity = bIn;
    enterLine.style.opacity = bIn;
    // Position below wheel: wheel center + wheel radius + gap
    let wr = Math.min(W, H) * 0.40;
    let btnTop = wheelCy + wr + 30;
    let lineTop = wheelCy + wr + 10;
    enterBtn.style.top = btnTop + 'px';
    enterLine.style.top = lineTop + 'px';
  }
}

// ============================================================
// VIGNETTE
// ============================================================
function drawVignette() {
  let grad = bgX.createRadialGradient(cx, cy, Math.min(W, H) * 0.3, cx, cy, Math.max(W, H) * 0.8);
  grad.addColorStop(0, 'rgba(0, 0, 0, 0)');
  grad.addColorStop(1, 'rgba(0, 0, 0, 0.6)');
  bgX.fillStyle = grad;
  bgX.fillRect(0, 0, W, H);
}

// ============================================================
// MAIN ANIMATION LOOP
// ============================================================
function animate(t) {
  let elapsed = Date.now() - startTime;
  updateWheelCenter(); // Track R letter position each frame

  // Clear
  bgX.fillStyle = '#030201';
  bgX.fillRect(0, 0, W, H);
  fgX.clearRect(0, 0, W, H);

  // Background layers
  drawStars(t);
  // Sun removed per user request
  drawGroundFire(t, elapsed);
  drawVignette();

  // Foreground layers
  drawFire(t, elapsed);
  drawEmbers(t, elapsed);
  drawChariotWheel(t, elapsed);
  drawChakra(t, elapsed);
  drawPillars(t, elapsed);
  drawShlokas(t, elapsed);
  drawGoldDust(t, elapsed);
  drawShield(t, elapsed);
  // Royal seal replaced by chariot wheel
  drawSanskritBorders(t, elapsed);
  drawEmberTrails(t);

  // Parallax & Cinematic
  applyParallax();
  updateCinematic(elapsed);

  requestAnimationFrame(animate);
}

// ============================================================
// INIT
// ============================================================
resize();
initFire();
initGoldDust();
initEmbers();
initShlokas();
requestAnimationFrame(animate);

</script>
