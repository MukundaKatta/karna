apiVersion: apps/v1
kind: Deployment
metadata:
  name: karna-gateway
  labels:
    app: karna
    component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: karna
      component: gateway
  template:
    metadata:
      labels:
        app: karna
        component: gateway
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: karna
              component: gateway
      containers:
        - name: gateway
          image: ghcr.io/mukundakatta/karna-gateway:latest
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          ports:
            - containerPort: 18789
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: GATEWAY_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: karna-secrets
                  key: gateway-auth-token
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: karna-secrets
                  key: anthropic-api-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 18789
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 18789
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health/startup
              port: 18789
            failureThreshold: 30
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: karna-gateway
  labels:
    app: karna
    component: gateway
spec:
  type: ClusterIP
  ports:
    - port: 18789
      targetPort: 18789
      protocol: TCP
  selector:
    app: karna
    component: gateway
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: karna-gateway
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: karna-gateway
spec:
  rules:
    - host: karna.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: karna-gateway
                port:
                  number: 18789
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: karna-gateway-pdb
  labels:
    app: karna
    component: gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: karna
      component: gateway
---
# Horizontal Pod Autoscaler (#618)
# Scales the gateway on CPU and memory utilization. For session/queue-depth
# based scaling, expose those as custom metrics (e.g. via the Prometheus
# Adapter, using the metrics added in #580) and add a `type: Pods` metric
# block referencing `karna_active_sessions` or `karna_queue_depth`.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: karna-gateway
  labels:
    app: karna
    component: gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: karna-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    # Uncomment once the Prometheus Adapter exposes the custom metric (#580):
    # - type: Pods
    #   pods:
    #     metric:
    #       name: karna_active_sessions
    #     target:
    #       type: AverageValue
    #       averageValue: "50"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
