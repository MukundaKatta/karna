apiVersion: apps/v1
kind: Deployment
metadata:
  name: karna-gateway
  labels:
    app: karna
    component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: karna
      component: gateway
  template:
    metadata:
      labels:
        app: karna
        component: gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/mukundakatta/karna-gateway:latest
          ports:
            - containerPort: 18789
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: GATEWAY_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: karna-secrets
                  key: gateway-auth-token
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: karna-secrets
                  key: anthropic-api-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 18789
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 18789
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health/startup
              port: 18789
            failureThreshold: 30
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: karna-gateway
  labels:
    app: karna
    component: gateway
spec:
  type: ClusterIP
  ports:
    - port: 18789
      targetPort: 18789
      protocol: TCP
  selector:
    app: karna
    component: gateway
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: karna-gateway
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: karna-gateway
spec:
  rules:
    - host: karna.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: karna-gateway
                port:
                  number: 18789
