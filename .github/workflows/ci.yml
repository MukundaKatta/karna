name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check workspace protocol
        run: pnpm run check:workspace-protocol

      - name: Validate workspace dependency graph
        run: pnpm run check:workspace-graph -- artifacts/workspace-graph.dot

      - name: Generate Turbo build graph
        run: |
          mkdir -p artifacts
          pnpm exec turbo run build --graph=artifacts/turbo-build-graph.html --dry=json

      - name: Generate workspace graph SVG
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          dot -Tsvg artifacts/workspace-graph.dot -o artifacts/workspace-graph.svg

      - name: Upload dependency graph artifacts
        uses: actions/upload-artifact@v4
        with:
          name: workspace-dependency-graphs
          path: artifacts/

      - name: Build
        run: pnpm run build

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test
        env:
          NODE_ENV: test

  commitlint:
    name: Commit Messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate pull request commits
        if: github.event_name == 'pull_request'
        run: pnpm exec commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

      - name: Validate pushed commits
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: pnpm exec commitlint --from "${{ github.event.before }}" --to "${{ github.sha }}" --verbose

  deploy-web:
    name: Deploy Web
    needs: [build, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6

      - name: Record skipped Vercel mirror when secrets are unavailable
        if: env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == ''
        run: |
          echo "Optional Vercel mirror skipped because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is not set."
          {
            echo "## Vercel auto-deploy skipped"
            echo ""
            echo "Required secrets missing. To re-enable:"
            echo ""
            echo "1. Get values from \`vercel link\` + \`vercel env\` in \`apps/web/\`."
            echo "2. Add \`VERCEL_TOKEN\`, \`VERCEL_ORG_ID\`, \`VERCEL_PROJECT_ID\` as [repo secrets](https://github.com/${{ github.repository }}/settings/secrets/actions)."
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: amondnet/vercel-action@v25
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        with:
          vercel-token: ${{ env.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          vercel-args: --prod
