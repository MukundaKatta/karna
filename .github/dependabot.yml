version: 2

registries:
  npmjs:
    type: npm-registry
    url: https://registry.npmjs.org

updates:
  - package-ecosystem: npm
    directory: /
    registries:
      - npmjs
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - area:repo
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /apps/mobile
    registries:
      - npmjs
    schedule:
      interval: weekly
      day: monday
      time: "09:20"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - area:mobile
    groups:
      mobile-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /apps/web
    registries:
      - npmjs
    schedule:
      interval: weekly
      day: monday
      time: "09:40"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - area:web
    groups:
      web-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /gateway
    registries:
      - npmjs
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - area:gateway
    groups:
