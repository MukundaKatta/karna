  - package-ecosystem: npm
    directory: /channels/slack
    registries:
      - npmjs
    schedule:
      interval: weekly
      day: monday
      time: "11:20"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - area:channels
    groups:
      slack-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
