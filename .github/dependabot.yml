    registries:
      - npmjs
    schedule:
      interval: weekly
      day: monday
      time: "10:40"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - area:packages
    groups:
      shared-minor-patch:
        update-types:
          - minor
