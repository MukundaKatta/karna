      interval: weekly
      day: monday
      time: "11:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - area:packages
    groups:
      supabase-minor-patch:
        update-types:
          - minor
