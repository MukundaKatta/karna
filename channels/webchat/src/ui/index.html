<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karna - Chat</title>
  <style>
    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a2e;
      --bg-chat: #16213e;
      --bg-input: #1a1a2e;
      --bg-user-msg: #0f3460;
      --bg-agent-msg: #1a1a2e;
      --text-primary: #e4e4e7;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --border: #27272a;
      --error: #ef4444;
      --success: #22c55e;
      --shadow: rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-logo {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: white;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
    }

    .header-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
    }

    .status-dot.connected {
      background: var(--success);
    }

    .status-dot.error {
      background: var(--error);
    }

    /* Chat Area */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 14px;
      word-wrap: break-word;
      white-space: pre-wrap;
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: var(--bg-user-msg);
      border-bottom-right-radius: 4px;
      color: var(--text-primary);
    }

    .message.agent {
      align-self: flex-start;
      background: var(--bg-agent-msg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
    }

    .message.error {
      align-self: center;
      background: transparent;
      border: 1px solid var(--error);
      color: var(--error);
      font-size: 13px;
      max-width: 90%;
    }

    .message.system {
      align-self: center;
      color: var(--text-muted);
      font-size: 12px;
      background: none;
      padding: 4px;
    }

    /* Code blocks in messages */
    .message pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 10px 12px;
      border-radius: 8px;
      margin: 8px 0;
      overflow-x: auto;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 13px;
    }

    .message code {
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 13px;
      background: rgba(0, 0, 0, 0.2);
      padding: 2px 5px;
      border-radius: 4px;
    }

    .message pre code {
      background: none;
      padding: 0;
    }

    /* Typing Indicator */
    .typing-indicator {
      display: none;
      align-self: flex-start;
      padding: 12px 16px;
      background: var(--bg-agent-msg);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }

    .typing-indicator.visible {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typingBounce 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input Area */
    .input-container {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    #messageInput {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 150px;
      overflow-y: auto;
      transition: border-color 0.2s;
    }

    #messageInput:focus {
      border-color: var(--accent);
    }

    #messageInput::placeholder {
      color: var(--text-muted);
    }

    #sendButton {
      padding: 10px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
      height: 42px;
    }

    #sendButton:hover {
      background: var(--accent-hover);
    }

    #sendButton:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .welcome h2 {
      font-size: 20px;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .message {
        max-width: 88%;
      }

      .header {
        padding: 10px 14px;
      }

      .chat-container {
        padding: 14px;
      }

      .input-container {
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">K</div>
    <div class="header-title">Karna</div>
    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="welcome">
      <h2>Welcome to Karna</h2>
      <p>Your AI agent is ready. Send a message to get started.</p>
    </div>
  </div>

  <div class="typing-indicator" id="typingIndicator">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>

  <div class="input-container">
    <div class="input-wrapper">
      <textarea
        id="messageInput"
        placeholder="Type a message..."
        rows="1"
        autofocus
      ></textarea>
    </div>
    <button id="sendButton" disabled>Send</button>
  </div>

  <script>
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const typingIndicator = document.getElementById('typingIndicator');

    let ws = null;
    let isConnected = false;
    let streamBuffer = '';
    let streamMessageEl = null;
    let reconnectAttempts = 0;
    let reconnectTimer = null;

    // ── WebSocket Connection ──

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${location.host}/ws`;

      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        isConnected = true;
        reconnectAttempts = 0;
        updateStatus('connected', 'Connected');
        sendButton.disabled = false;
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          handleServerMessage(data);
        } catch (e) {
          console.error('Failed to parse message:', e);
        }
      };

      ws.onclose = () => {
        isConnected = false;
        updateStatus('error', 'Disconnected');
        sendButton.disabled = true;
        scheduleReconnect();
      };

      ws.onerror = () => {
        updateStatus('error', 'Error');
      };
    }

    function scheduleReconnect() {
      if (reconnectTimer) return;

      const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
      reconnectAttempts++;
      updateStatus('error', `Reconnecting in ${Math.round(delay / 1000)}s...`);

      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connect();
      }, delay);
    }

    function updateStatus(state, text) {
      statusDot.className = 'status-dot ' + state;
      statusText.textContent = text;
    }

    // ── Message Handling ──

    function handleServerMessage(data) {
      switch (data.type) {
        case 'connected':
          addSystemMessage('Connected to Karna');
          break;

        case 'message':
          hideTyping();
          finishStream();
          addMessage('agent', data.content);
          break;

        case 'stream':
          hideTyping();
          handleStream(data.delta, data.finishReason);
          break;

        case 'status':
          if (data.state === 'thinking') {
            showTyping();
          }
          break;

        case 'error':
          hideTyping();
          finishStream();
          addMessage('error', data.message || 'An error occurred');
          break;

        case 'pong':
          break;
      }
    }

    function handleStream(delta, finishReason) {
      if (!streamMessageEl) {
        streamMessageEl = document.createElement('div');
        streamMessageEl.className = 'message agent';
        chatContainer.appendChild(streamMessageEl);
        streamBuffer = '';
      }

      streamBuffer += delta;
      streamMessageEl.innerHTML = renderMarkdown(streamBuffer);
      scrollToBottom();

      if (finishReason) {
        finishStream();
      }
    }

    function finishStream() {
      streamMessageEl = null;
      streamBuffer = '';
    }

    function addMessage(role, content) {
      // Remove welcome on first message
      const welcome = chatContainer.querySelector('.welcome');
      if (welcome) welcome.remove();

      const el = document.createElement('div');
      el.className = `message ${role}`;

      if (role === 'agent') {
        el.innerHTML = renderMarkdown(content);
      } else {
        el.textContent = content;
      }

      chatContainer.appendChild(el);
      scrollToBottom();
    }

    function addSystemMessage(text) {
      const el = document.createElement('div');
      el.className = 'message system';
      el.textContent = text;
      chatContainer.appendChild(el);
      scrollToBottom();
    }

    function showTyping() {
      typingIndicator.classList.add('visible');
      chatContainer.appendChild(typingIndicator);
      scrollToBottom();
    }

    function hideTyping() {
      typingIndicator.classList.remove('visible');
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        chatContainer.scrollTop = chatContainer.scrollHeight;
      });
    }

    // ── Simple Markdown Renderer ──

    function renderMarkdown(text) {
      let html = escapeHtml(text);

      // Code blocks
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Bold
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

      // Italic
      html = html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');

      // Line breaks
      html = html.replace(/\n/g, '<br>');

      return html;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ── Send Message ──

    function sendMessage() {
      const content = messageInput.value.trim();
      if (!content || !isConnected) return;

      addMessage('user', content);
      messageInput.value = '';
      autoResize();

      ws.send(JSON.stringify({
        type: 'message',
        content: content,
      }));
    }

    // ── Input Handling ──

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    messageInput.addEventListener('input', autoResize);

    sendButton.addEventListener('click', sendMessage);

    function autoResize() {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
    }

    // ── Heartbeat ──

    setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'ping' }));
      }
    }, 30000);

    // ── Initialize ──

    connect();
  </script>
</body>
</html>
